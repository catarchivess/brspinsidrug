<svg width="680" height="940" viewBox="0 0 680 940" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Workflow analisis network pharmacology</title>
<desc>Diagram alur sembilan tahap analisis network pharmacology, dari identifikasi senyawa hingga interpretasi hasil.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<style>
text { font-family: Arial, Helvetica, sans-serif; }
.th { font-size: 15px; font-weight: 700; }
.ts { font-size: 12px; font-weight: 400; }
.grp-label { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
.arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
</style>

<!-- background -->
<rect x="0" y="0" width="680" height="940" fill="#FFFFFF"/>

<!-- title -->
<text x="340" y="34" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#2C2C2A">Workflow Analisis Network Pharmacology</text>

<!-- group background bands -->
<rect x="60" y="56" width="560" height="238" rx="16" fill="#F7FAFE" stroke="#B5D4F4" stroke-width="1"/>
<text x="80" y="80" class="grp-label" fill="#0C447C">TAHAP PENGUMPULAN DATA</text>

<rect x="60" y="314" width="560" height="238" rx="16" fill="#F3FAF7" stroke="#9FE1CB" stroke-width="1"/>
<text x="80" y="338" class="grp-label" fill="#085041">TAHAP KONSTRUKSI &amp; VISUALISASI NETWORK</text>

<rect x="60" y="572" width="560" height="322" rx="16" fill="#FEFAF2" stroke="#FAC775" stroke-width="1"/>
<text x="80" y="596" class="grp-label" fill="#633806">TAHAP ANALISIS &amp; INTERPRETASI</text>

<!-- Step 1 -->
<g>
<rect x="170" y="96" width="340" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="340" y="118" text-anchor="middle" dominant-baseline="central" class="th" fill="#0C447C">1. Identifikasi senyawa</text>
<text x="340" y="138" text-anchor="middle" dominant-baseline="central" class="ts" fill="#185FA5">Database PubChem</text>
</g>
<line x1="340" y1="152" x2="340" y2="182" class="arr" marker-end="url(#arrow)"/>

<!-- Step 2 -->
<g>
<rect x="170" y="182" width="340" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="340" y="204" text-anchor="middle" dominant-baseline="central" class="th" fill="#0C447C">2. Prediksi target protein</text>
<text x="340" y="224" text-anchor="middle" dominant-baseline="central" class="ts" fill="#185FA5">SwissTargetPrediction</text>
</g>
<line x1="340" y1="238" x2="340" y2="268" class="arr" marker-end="url(#arrow)"/>

<!-- Step 3 -->
<g>
<rect x="170" y="268" width="340" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="340" y="290" text-anchor="middle" dominant-baseline="central" class="th" fill="#0C447C">3. Identifikasi target penyakit</text>
<text x="340" y="310" text-anchor="middle" dominant-baseline="central" class="ts" fill="#185FA5">OMIM</text>
</g>
<line x1="340" y1="324" x2="340" y2="354" class="arr" marker-end="url(#arrow)"/>

<!-- Step 4 -->
<g>
<rect x="170" y="354" width="340" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="376" text-anchor="middle" dominant-baseline="central" class="th" fill="#085041">4. Pencarian target beririsan</text>
<text x="340" y="396" text-anchor="middle" dominant-baseline="central" class="ts" fill="#0F6E56">Diagram Venn</text>
</g>
<line x1="340" y1="410" x2="340" y2="440" class="arr" marker-end="url(#arrow)"/>

<!-- Step 5 -->
<g>
<rect x="170" y="440" width="340" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="462" text-anchor="middle" dominant-baseline="central" class="th" fill="#085041">5. Konstruksi PPI network</text>
<text x="340" y="482" text-anchor="middle" dominant-baseline="central" class="ts" fill="#0F6E56">STRING (confidence &#8805; 0.4)</text>
</g>
<line x1="340" y1="496" x2="340" y2="526" class="arr" marker-end="url(#arrow)"/>

<!-- Step 6 -->
<g>
<rect x="170" y="526" width="340" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="548" text-anchor="middle" dominant-baseline="central" class="th" fill="#085041">6. Visualisasi network</text>
<text x="340" y="568" text-anchor="middle" dominant-baseline="central" class="ts" fill="#0F6E56">Cytoscape</text>
</g>
<line x1="340" y1="582" x2="340" y2="612" class="arr" marker-end="url(#arrow)"/>

<!-- Step 7 -->
<g>
<rect x="170" y="612" width="340" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="634" text-anchor="middle" dominant-baseline="central" class="th" fill="#633806">7. Identifikasi hub protein</text>
<text x="340" y="654" text-anchor="middle" dominant-baseline="central" class="ts" fill="#854F0B">Degree centrality (cytoHubba)</text>
</g>
<line x1="340" y1="668" x2="340" y2="698" class="arr" marker-end="url(#arrow)"/>

<!-- Step 8 -->
<g>
<rect x="170" y="698" width="340" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="720" text-anchor="middle" dominant-baseline="central" class="th" fill="#633806">8. Enrichment analysis</text>
<text x="340" y="740" text-anchor="middle" dominant-baseline="central" class="ts" fill="#854F0B">GO &amp; KEGG pathway (ShinyGO/Metascape)</text>
</g>
<line x1="340" y1="754" x2="340" y2="784" class="arr" marker-end="url(#arrow)"/>

<!-- Step 9 -->
<g>
<rect x="170" y="784" width="340" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="806" text-anchor="middle" dominant-baseline="central" class="th" fill="#633806">9. Interpretasi hasil</text>
<text x="340" y="826" text-anchor="middle" dominant-baseline="central" class="ts" fill="#854F0B">Mekanisme molekuler senyawa terhadap penyakit</text>
</g>

</svg>
